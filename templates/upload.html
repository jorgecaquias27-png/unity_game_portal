<!DOCTYPE html>
<html>
<head>
    <title>Upload Unity Game</title>
</head>
<body>
    <h1>Upload a Unity Game</h1>
    <form action="/submit" method="POST" enctype="multipart/form-data">
        <label>Game Title:</label><br>
        <input type="text" name="title" required><br><br>

        <label>Description:</label><br>
        <textarea name="description" required></textarea><br><br>

        <label>Thumbnail Image:</label><br>
        <input type="file" name="thumbnail" accept="image/*" required><br><br>

        <label>Unity WebGL Zip:</label><br>
        <input type="file" name="zipfile" accept=".zip" required><br><br>

        <button type="submit">Upload Game</button>
    </form>
</body>
</html>
